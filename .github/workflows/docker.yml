name: docker
permissions:
  contents: read

on:
  push:
    branches:
      - "main"

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Extract crate version
        id: crate_version
        run: |
          set -euo pipefail
          VERSION="$(sed -n 's/^version[[:space:]]*=[[:space:]]*"\(.*\)"$/\1/p' Cargo.toml | head -n 1)"
          if [[ -z "${VERSION}" ]]; then
            echo "Unable to read version from Cargo.toml" >&2
            exit 1
          fi
          if [[ "${VERSION}" == v* ]]; then
            TAG="${VERSION}"
          else
            TAG="v${VERSION}"
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PAT }}
      - name: Set up QEMU for cross-compilation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: cloud
          endpoint: "thachp/eventdbx"
      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          pull: true
          push: true
          tags: |
            ${{ vars.DOCKER_USER }}/eventdbx:${{ steps.crate_version.outputs.tag }}
            ${{ vars.DOCKER_USER }}/eventdbx:latest
          labels: |
            org.opencontainers.image.source=https://github.com/thachp/eventdbx
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.crate_version.outputs.version }}
          platforms: linux/amd64,linux/arm64
          provenance: mode=max
          sbom: true
  
